services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - extern
      - private
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-file:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fileservice
      POSTGRES_USER: fileservice
      POSTGRES_PASSWORD: fileservice
    volumes:
      - postgres-file-data:/var/lib/postgresql/data
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fileservice"]
      interval: 5s
      timeout: 5s
      retries: 5

  file-service:
    build: .
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_PUBLIC_ENDPOINT: http://host.docker.internal:9000
      MINIO_BUCKET: files
      FILE_SERVICE_PUBLIC_URL: http://file-service:8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-file:5432/fileservice
      SPRING_DATASOURCE_USERNAME: fileservice
      SPRING_DATASOURCE_PASSWORD: fileservice
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "52004:8080"
    depends_on:
      minio:
        condition: service_healthy
      postgres-file:
        condition: service_healthy
    networks:
      - extern
      - private

volumes:
  minio-data:
  postgres-file-data:

networks:
  extern:
    name: gateway
    external: true
  private:
    driver: bridge
    internal: true
